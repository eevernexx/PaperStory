<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#FFF8E7"/>
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#0A0A0A" stroke-width="16"/>

  <!-- coral block accent top-right -->
  <rect x="940" y="40" width="160" height="160" rx="20" fill="#FF6B6B" stroke="#0A0A0A" stroke-width="6"/>
  <text x="1020" y="142" font-family="Arial Black, Helvetica, sans-serif" font-size="96" font-weight="900" text-anchor="middle" fill="#0A0A0A">P</text>

  <!-- title -->
  <text x="80" y="200" font-family="Arial Black, Helvetica, sans-serif" font-size="120" font-weight="900" fill="#0A0A0A">PaperStory</text>

  <!-- tagline -->
  <text x="80" y="270" font-family="Georgia, serif" font-style="italic" font-size="44" fill="#1a1a1a">Research deserves better than PDFs.</text>

  <!-- subtitle -->
  <text x="80" y="330" font-family="Helvetica, sans-serif" font-size="26" fill="#444">Seven published papers, reimagined as interactive scrollytelling.</text>

  <!-- topic pills -->
  <g font-family="Arial Black, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0A0A0A">
    <g transform="translate(80, 470)">
      <rect width="200" height="56" rx="28" fill="#FFB89E" stroke="#0A0A0A" stroke-width="5"/>
      <text x="100" y="36" text-anchor="middle">F1 ACCELERATOR</text>
    </g>
    <g transform="translate(300, 470)">
      <rect width="160" height="56" rx="28" fill="#B8F2C9" stroke="#0A0A0A" stroke-width="5"/>
      <text x="80" y="36" text-anchor="middle">COFFEE CV</text>
    </g>
    <g transform="translate(480, 470)">
      <rect width="160" height="56" rx="28" fill="#A8D8FF" stroke="#0A0A0A" stroke-width="5"/>
      <text x="80" y="36" text-anchor="middle">ENV LAW</text>
    </g>
    <g transform="translate(660, 470)">
      <rect width="160" height="56" rx="28" fill="#C9B6FF" stroke="#0A0A0A" stroke-width="5"/>
      <text x="80" y="36" text-anchor="middle">AR EDU</text>
    </g>
    <g transform="translate(840, 470)">
      <rect width="160" height="56" rx="28" fill="#FFE066" stroke="#0A0A0A" stroke-width="5"/>
      <text x="80" y="36" text-anchor="middle">DESIGN</text>
    </g>
  </g>

  <!-- bottom mark -->
  <text x="80" y="582" font-family="Helvetica, sans-serif" font-size="18" fill="#666">paperstory.vercel.app</text>
</svg>
